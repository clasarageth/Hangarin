{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid">

    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">Notes</h1>
    </div>

    <div class="card shadow mb-4">
        <div class="card-body">
            
            <div class="d-flex justify-content-end mb-3">
                <a href="{% url 'notes-add' %}" class="btn btn-primary">Add Note</a>
            </div>

            <div class="table-responsive">
                <table class="table table-hover" id="dataTable" width="100%" cellspacing="0">
                    <thead class="thead-light">
                        <tr>
                            <th>Content</th>
                            <th class="text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for object in object_list %}
                        <tr>
                            <td style="width: 800px;">{{ object.content }}</td>
                            <td class="text-right">
                                <a href="/notes_list/{{ object.pk }}" class="btn btn-primary btn-sm mr-1">Edit</a>
                                <a href="/notes_list/{{ object.pk }}/delete" class="btn btn-danger btn-sm">Delete</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

        </div>
    </div>

</div>
{% endblock %}
